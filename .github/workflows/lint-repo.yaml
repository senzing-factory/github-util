name: lint repo

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-code-base:
    permissions:
      contents: read
      packages: read
      pull-requests: write
      statuses: write
    uses: senzing-factory/build-resources/.github/workflows/linter.yaml@v4
